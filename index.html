<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poster Page</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f5f5f5;
    }

    .poster {
      width: 90vw;
      max-width: 400px;
      aspect-ratio: 2 / 3;
      border-radius: 16px;
      position: relative;
      overflow: hidden;
    }

    .poster a.poster-link-top {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
    }

    .poster img.flyer {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .poster-overlay {
      position: absolute;
      bottom: 0;
      width: 100%;
      padding: 16px;
      color: white;
      text-align: center;
      z-index: 3;
    }

    .socials {
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .socials img {
      width: 28px;
      height: 28px;
      object-fit: contain;
      filter: none; /* removed filter so icons are visible */
    }
  </style>
</head>
<body>
  <div class="poster">
    <img class="flyer" src="assets/images/FlyerTest.jpg" alt="flyer">

    <!-- Clickable overlay link on top of poster -->
    <a href="https://www.facebook.com/profile.php?id=61578683642159" target="_blank" class="poster-link-top"></a>

    <div class="poster-overlay">
      <!-- 📱 SOCIAL ICONS -->
      <div class="socials">
        <a href="https://www.instagram.com/showhouse.insta/" target="_blank">
          <img src="assets/images/insta.png" alt="Instagram">
        </a>

        <a href="https://www.facebook.com/profile.php?id=61578683642159" target="_blank">
          <img src="assets/images/facebook.png" alt="Facebook">
        </a>
      </div>
    </div>
  </div>
</body>
</html>
