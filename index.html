<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flyer</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
}

/* Background */
body {
    background: linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.6),
        rgba(255, 255, 255, 0)
    ),
    #0d65b2;

    display: flex;
    justify-content: center;
    align-items: center;
}

/* Aspect ratio container */
.flyer-box {
    position: relative;
    width: 100%;
    max-width: 600px;
    aspect-ratio: 9 / 16; /* adjust if your flyer differs */
}

/* Flyer image fills container */
.flyer-box img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Social icons container */
.socials a {
    position: absolute;
}

/* ✅ Relative sizing (no px) */
.socials img {
    width: clamp(5%, 6vw, 10%);
    height: auto;
}

/* ✅ Position icons using % (scales with flyer) */
.instagram {
    top: 50%;
    left: 30%;
}

.facebook {
    top: 80%;
    left: 55%;
}
</style>
</head>

<body>

<div class="flyer-box">
    <img src="assets/images/FlyerTest.jpg" alt="Flyer">

    <div class="socials">
        <a href="https://www.instagram.com/showhouse.insta/" target="_blank" class="instagram">
            <img src="assets/images/insta.png" alt="Instagram">
        </a>

        <a href="https://www.facebook.com/profile.php?id=61578683642159" target="_blank" class="facebook">
            <img src="assets/images/facebook.png" alt="Facebook">
        </a>
    </div>
</div>

</body>
</html>
