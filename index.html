<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flyer</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        body {
            background: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0.6),
                rgba(255, 255, 255, 0)
            ),
            #0d65b2;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Wrapper to position icons over image */
        .wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Flyer image */
        .flyer {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
        }

        /* Social icons */
        .socials {
            position: absolute;
            bottom: 3%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 2vw;
        }

        .socials img {
            width: clamp(40px, 6vw, 90px);
            height: auto;
        }
    </style>
</head>

<body>

    <div class="wrapper">
        <img class="flyer" src="assets/images/FlyerTest.jpg" alt="Flyer">

        <div class="socials">
            <a href="https://www.instagram.com/showhouse.insta/" target="_blank">
                <img src="assets/images/insta.png" alt="Instagram">
            </a>

            <a href="https://www.facebook.com/profile.php?id=61578683642159" target="_blank">
                <img src="assets/images/facebook.png" alt="Facebook">
            </a>
        </div>
    </div>

</body>
</html>
