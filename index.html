<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flyer</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        body {
            background: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0.6),
                rgba(255, 255, 255, 0)
            ), #0d65b2;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* CONTAINER */
        .flyer-container {
            position: relative;
            width: 100%;
            max-width: 900px; /* keeps flyer readable on large screens */
            aspect-ratio: 9 / 16; /* adjust to match your flyer image */
        }

        /* FLYER IMAGE */
        .flyer {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* SOCIAL ICONS */
        .socials {
            position: absolute;
            bottom: 3%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: clamp(10px, 4vw, 40px);
        }

        .socials a {
            position: relative;
        }

        .socials img {
            width: clamp(40px, 10vw, 90px);
            height: auto;
            transition: transform 0.2s ease, box-shadow 0.3s ease;
        }

        .socials a:hover img {
            transform: scale(1.1);
            box-shadow: 
                0 0 15px rgba(0, 123, 255, 0.8),
                0 0 10px rgba(0, 123, 255, 0.6),
                0 0 15px rgba(0, 123, 255, 0.4);
        }

        /* TOOLTIP */
        .socials a::after {
            content: attr(data-name);
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: black;
            padding: 5px 8px;
            font-size: 12px;
            border-radius: 5px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .socials a:hover::after {
            opacity: 1;
        }

        /* MOBILE TWEAKS */
        @media (max-width: 480px) {
            .flyer-container {
                max-width: 100%;
            }

            .socials {
                bottom: 2%;
            }
        }
    </style>
</head>

<body>

    <div class="flyer-container">
        <img class="flyer" src="assets/images/FlyerTest.jpg" alt="flyer">

        <div class="socials">
            <a href="https://www.instagram.com/showhouse.insta/" target="_blank" data-name="Instagram">
                <img src="assets/images/insta.png" alt="instagram">
            </a>

            <a href="https://www.facebook.com/profile.php?id=61578683642159" target="_blank" data-name="Facebook">
                <img src="assets/images/facebook.png" alt="Facebook">
            </a>
        </div>
    </div>

</body>
</html>
