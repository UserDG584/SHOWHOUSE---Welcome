<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flyer</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0.6),
                rgba(255, 255, 255, 0)
            ),
            #007BFF;
        }

        .flyer-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .flyer {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .socials {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
        }

        .socials a {
            position: relative;
            display: inline-block;
        }

        .socials img {
            width: 8vw;
            max-width: 50px;
            min-width: 30px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .socials a:hover img {
            transform: scale(1.2);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.9);
        }

        .socials a::after {
            content: attr(data-name);
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: black;
            padding: 5px 8px;
            font-size: 12px;
            border-radius: 5px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .socials a:hover::after {
            opacity: 1;
        }
    </style>
</head>

<body>

    <div class="flyer-container">
        <img src="images/FlyerTest.jpg" alt="Flyer" class="flyer">

        <div class="socials">
            <a href="https://facebook.com" target="_blank" data-name="Facebook">
                <img src="images/facebook.png" alt="Facebook">
            </a>

            <a href="https://instagram.com" target="_blank" data-name="Instagram">
                <img src="images/insta.png" alt="Instagram">
            </a>
        </div>
    </div>

</body>
</html>
