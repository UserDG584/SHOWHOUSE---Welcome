<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flyer</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            /* Blue background with white linear backdrop */
            background: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0.6),
                rgba(255, 255, 255, 0)
            ),
            #1d53a9; /* blue base */
        }

        .flyer-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .flyer {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .socials {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
        }

        .socials img {
            width: 8vw;
            max-width: 50px;
            min-width: 30px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="flyer-container">
        <img src="images/FlyerTest.jpg" alt="Flyer" class="flyer">

        <div class="socials">
            <a href="https://facebook.com" target="_blank">
                <img src="images/facebook.png" alt="Facebook">
                <a href="http://https://www.facebook.com/profile.php?id=61578683642159"></a>
            </a>

            <a href="https://instagram.com" target="_blank">
                <img src="images/insta.png" alt="Instagram">
                <a href="http://https://www.instagram.com/showhouse.insta/"></a>
            </a>
        </div>
    </div>

</body>
</html>
