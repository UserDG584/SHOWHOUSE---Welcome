<!DOCTYPE html>    
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flyer</title>

    <style>
        /* 🔒 LOCK PAGE */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        body {
            background: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0.6),
                rgba(255, 255, 255, 0)
            ),
            #0d65b2;
        }

        /* 🔒 CENTER LAYOUT PROPERLY */
        .flyer-container {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ✅ RESPONSIVE FLYER IMAGE (NO STRETCHING) */
        .flyer {
            max-width: 100%;
            max-height: 100vh;
            width: auto;
            height: auto;
            object-fit: contain;
            pointer-events: none;
        }

        /* ✅ SOCIAL ICONS */
        .socials {
            position: absolute;
            bottom: 2%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 2vw;
        }

        .socials a {
            position: relative;
            display: inline-block;
        }

        .socials img {
            width: clamp(40px, 6vw, 90px);
            height: auto;
            transition: transform 0.2s ease, box-shadow 0.3s ease;
            transform-origin: center;
        }

        /* 🔵 HOVER EFFECT */
        .socials a:hover img {
            transform: scale(1.1);
            box-shadow: 
                0 0 15px rgba(0, 123, 255, 0.8),
                0 0 10px rgba(0, 123, 255, 0.6),
                0 0 15px rgba(0, 123, 255, 0.4);
        }

        /* TOOLTIP */
        .socials a::after {
            content: attr(data-name);
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: black;
            padding: 5px 8px;
            font-size: 12px;
            border-radius: 5px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .socials a:hover::after {
            opacity: 1;
        }

        /* 📱 MOBILE TWEAK */
        @media (max-width: 600px) {
            .socials {
                bottom: 4%;
                gap: 3vw;
            }

            .socials img {
                width: clamp(35px, 8vw, 60px);
            }
        }

        /* 📲 TABLETS */
        @media (min-width: 601px) and (max-width: 1024px) {
            .socials {
                bottom: 3%;
                gap: 1.5vw;
            }

            .socials img {
                width: clamp(50px, 5vw, 80px);
            }
        }

        /* 💻 LARGE SCREENS */
        @media (min-width: 1025px) {
            .socials {
                bottom: 2%;
                gap: 1vw;
            }

            .socials img {
                width: clamp(60px, 4vw, 90px);
            }
        }
    </style>
</head>

<body>

    <div class="flyer-container">
        <img class="flyer" src="assets/images/FlyerTest.jpg" alt="flyer">

        <div class="socials">
            <a href="https://www.instagram.com/showhouse.insta/" target="_blank" data-name="Instagram">
                <img src="assets/images/insta.png" alt="instagram">
            </a>

            <a href="https://www.facebook.com/profile.php?id=61578683642159" target="_blank" data-name="Facebook">
                <img src="assets/images/facebook.png" alt="Facebook">
            </a>
        </div>
    </div>

</body>
</html>
