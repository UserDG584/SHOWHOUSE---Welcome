<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flyer</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
}

/* No background at all */
body {
    background: transparent;
}

/* Fullscreen flyer */
.flyer-container {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
}

.flyer {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
}
</style>
</head>

<body>

<div class="flyer-container">
    <img class="flyer" src="assets/images/FlyerTest.jpg" alt="Flyer">
</div>

</body>
</html>
