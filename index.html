<!DOCTYPE html>     
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flyer</title>

    <style>
        /* 🔒 LOCK PAGE */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: transparent; /* removed background */
        }

        /* 🔒 CENTER CONTAINER */
        .flyer-container {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ✅ RESPONSIVE FLYER WRAPPER */
        .flyer-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Flyer image fits entire screen while preserving aspect ratio */
        .flyer {
            width: 100%;
            height: 100%;
            object-fit: contain; /* ensures full flyer visible */
            display: block;
            pointer-events: none;
        }

        /* ✅ SOCIAL ICONS OVERLAY (RELATIVE TO FLYER AREA) */
        .socials {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 4%;
        }

        .socials a {
            position: relative;
            display: inline-block;
        }

        /* ✅ RESPONSIVE ICON SIZE */
        .socials img {
            width: clamp(40px, 5vw, 80px);
            height: auto;
            transition: transform 0.2s ease, box-shadow 0.3s ease;
            transform-origin: center;
        }

        /* 🔵 HOVER EFFECT */
        .socials a:hover img {
            transform: scale(1.1);
            box-shadow: 
                0 0 15px rgba(0, 123, 255, 0.8),
                0 0 10px rgba(0, 123, 255, 0.6),
                0 0 15px rgba(0, 123, 255, 0.4);
        }

        /* TOOLTIP */
        .socials a::after {
            content: attr(data-name);
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: black;
            padding: 5px 8px;
            font-size: 12px;
            border-radius: 5px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .socials a:hover::after {
            opacity: 1;
        }

        /* 📱 MOBILE ADJUSTMENTS */
        @media (max-width: 600px) {
            .socials {
                bottom: 10%;
                gap: 3%;
            }
        }
    </style>
</head>

<body>

<div class="flyer-container">

    <div class="flyer-wrapper">

        <img class="flyer" src="assets/images/FlyerTest.jpg" alt="flyer">

        <!-- SOCIAL ICONS OVERLAY -->
        <div class="socials">
            <a href="https://www.instagram.com/showhouse.insta/" target="_blank" data-name="Instagram">
                <img src="assets/images/insta.png" alt="instagram">
            </a>

            <a href="https://www.facebook.com/profile.php?id=61578683642159" target="_blank" data-name="Facebook">
                <img src="assets/images/facebook.png" alt="Facebook">
            </a>
        </div>

    </div>

</div>

</body>
</html>
