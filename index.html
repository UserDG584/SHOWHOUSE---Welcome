<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flyer</title>

    <style>
        /* Fullscreen layout */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        /* Background */
        body {
            background: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0.6),
                rgba(255, 255, 255, 0)
            ),
            #0d65b2;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Responsive flyer image */
        img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
        }
    </style>
</head>

<body>

    <img src="assets/images/FlyerTest.jpg" alt="Flyer">

</body>
</html>
