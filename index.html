<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrollable Flyer</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0.6),
                rgba(255, 255, 255, 0)
            ),
            #0d65b2;
        }

        /* each scroll page */
        .page {
            height: 100vh;
            position: relative;
        }

        body {
            
        }

        /* FLYER CONTAINER (no longer fixed) */
        .flyer-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .flyer {
            max-width: 90%;
            max-height: 90%;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
            margin: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .socials {
            position: absolute;
            bottom: 2%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 60px;
        }

        .socials a {
            position: relative;
            display: inline-block;
        }

        .socials img {
            width: 8vw;
            max-width: 625px;
            min-width: 150px;
            transition: transform 0.2s ease, box-shadow 0.3s ease;
            transform-origin: center;
        }

        .socials a:hover img {
            transform: scale(1.1);
            box-shadow: 
                0 0 15px rgba(0, 123, 255, 0.8),
                0 0 10px rgba(0, 123, 255, 0.6),
                0 0 15px rgba(0, 123, 255, 0.4);
        }

        .socials a::after {
            content: attr(data-name);
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: black;
            padding: 5px 8px;
            font-size: 12px;
            border-radius: 5px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .socials a:hover::after {
            opacity: 1;
        }
    </style>
</head>

<body>

    <!-- PAGE 1: FLYER -->
    <div class="page">
        <div class="flyer-container">
            <img class="flyer" src="assets/images/FlyerTest.jpg" alt="flyer">

            <div class="socials">
                <a href="https://www.instagram.com/showhouse.insta/" target="_blank" data-name="Instagram">
                    <img src="assets/images/insta.png" alt="instagram">
                </a>

                <a href="https://www.facebook.com/profile.php?id=61578683642159" target="_blank" data-name="Facebook">
                    <img src="assets/images/facebook.png" alt="Facebook">
                </a>
            </div>
        </div>
    </div>

    <!-- EXTRA BLANK SCROLL PAGES -->
    <div class="page"></div>
    <div class="page"></div>

</body>
</html>
