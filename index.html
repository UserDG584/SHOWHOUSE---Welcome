<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flyer</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
}

body {
    background: linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.6),
        rgba(255, 255, 255, 0)
    ),
    #0d65b2;

    display: flex;
    justify-content: center;
    align-items: center;
}

/* 🔑 Adjust aspect ratio here */
.flyer-box {
    width: 100%;
    max-width: 600px;
    aspect-ratio: 9 / 16;
    position: relative;
}

/* Flyer image */
.flyer-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}
</style>
</head>

<body>

<div class="flyer-box">
    <img src="assets/images/FlyerTest.jpg" alt="Flyer">
</div>

</body>
</html>
