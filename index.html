<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flyer</title>

<style>
html, body {
    margin: 0;
    padding: 0;
}

/* Allow scrolling */
body {
    overflow-y: auto;
}

/* Container allows natural height */
.flyer-container {
    width: 100%;
}

/* Image scales to screen width and grows in height */
.flyer {
    width: 100%;
    height: auto;
    display: block;
}
</style>
</head>

<body>

<div class="flyer-container">
    <img class="flyer" src="assets/images/FlyerTest.jpg" alt="Flyer">
</div>

</body>
</html>
