
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poster Page</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      /* Blue gradient background */
      background: linear-gradient(105deg, #0352ab, #c8e1ff
    );
    }

    .poster {
      width: 90vw;
      max-width: 400px;
      aspect-ratio: 2 / 3;
      border-radius: 2px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3); /* optional: adds depth */
    }

    .poster img.flyer {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Social icons */
    .socials {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 0px;
      position: absolute;
      bottom: -37px;
      left: 27.5%;
      transform: translateX(-50%);
      z-index: 3;
    }

    .socials img {
      width: 100px;
      height: 100px;
      object-fit: contain;
      filter: none;
      transition: transform 0.3s ease, filter 0.3s ease;
    }

    .socials img:hover {
      transform: scale(1.1);
      filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.3));
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="poster">
    <img class="flyer" src="assets/images/FlyerTest.jpg" alt="flyer">

    <!-- Social icons -->
    <div class="socials">
      <a href="https://www.instagram.com/showhouse.insta/" target="_blank">
        <img src="assets/images/insta.png" alt="Instagram">
      </a>

      <a href="https://www.facebook.com/profile.php?id=61578683642159" target="_blank">
        <img src="assets/images/facebook.png" alt="Facebook">
      </a>
    </div>
  </div>
</body>
</html>
